<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>
    <body>
        <h1>Calculator</h1>
        <section class="calculator-area">
            <div class="calculator-body">
                <textarea class="display"></textarea>
                <section  class="input">
                    <section class="numberpad">

                        <button class="seven digit"  >7</button>
                        <button class="eight digit"  >8</button>
                        <button class="nine digit"   >9</button>

                        <button class="four digit"   >4</button>
                        <button class="five digit"    >5</button>
                        <button class="six digit"    >6</button>
                        
                        <button class="one digit"    >1</button>
                        <button class="two digit"    >2</button>
                        <button class="three digit"  >3</button>
                        
                        <button class="zero digit"   >0</button>
                        <button class="decimal digit">.</button>
                    </section>
                
                    
                    <section class="operations">
                        <button class="add operator"      >+</button>
                        <button class="subtract operator" >-</button>
                        <button class="multiply operator" >*</button>
                        <button class="division operator" >/</button>
                        <button class="clear operator"    >C</button>
                        <button class="equals operator"   >=</button>
                    </section>
                </section>
            </div>
        </section>
    </body>
</html>
